name: CI Pipeline

permissions:
  contents: read

# Se ejecuta en pushes a la rama main y en todos los pull requests
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    name: Pruebas y Seguridad (tests)
    runs-on: ubuntu-latest

    # IMPORTANTE: Configurar estos secrets en
    # GitHub Settings > Secrets and variables > Actions
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      # Paso 1: Clonar el repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # Paso 2: Configurar pnpm versión 9
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Paso 3: Configurar Node.js versión 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # Paso 4: Instalar las dependencias usando pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Paso 5: Ejecutar la batería de pruebas masivas (tests + audit de seguridad)
      - name: Run tests
        run: pnpm run test
        
      # Paso 6: Ejecutar auditoría de seguridad
      - name: Run security audit
        run: pnpm run test:security

  lint:
    name: Code Analysis (lint)
    # Este job depende de que el job 'tests' pase exitosamente
    needs: tests
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Clonar el repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # Paso 2: Configurar pnpm versión 9
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Paso 3: Configurar Node.js versión 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # Paso 4: Instalar las dependencias usando pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Paso 5: Ejecutar el lint (no bloquea el pipeline si falla)
      - name: Run linter
        run: pnpm run lint
        continue-on-error: true
